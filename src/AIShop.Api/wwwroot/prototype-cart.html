<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>购物车 UI 原型</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;height:100vh}

.login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:24px}
.login-screen h1{font-size:2rem;color:#1a1a2e}
.login-screen p{color:#666;font-size:1.1rem}
.login-buttons{display:flex;gap:16px}
.login-btn{padding:20px 40px;font-size:1.2rem;border:none;border-radius:12px;cursor:pointer;transition:transform .15s,box-shadow .15s;font-weight:600}
.login-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.15)}
.login-btn.marla{background:#e8d5f5;color:#6b21a8}
.login-btn.steve{background:#d5e8f5;color:#1e40af}
.login-nav{position:absolute;top:20px;right:24px}
.app{display:flex;height:100vh;flex-direction:column}

.header{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;background:#1a1a2e;color:white}
.header h2{font-size:1.1rem}
.header .user-info{display:flex;align-items:center;gap:12px}
.nav-link{padding:6px 16px;background:none;color:rgba(255,255,255,.8);border:1px solid rgba(255,255,255,.3);border-radius:6px;cursor:pointer;font-size:.85rem;transition:all .15s}
.nav-link:hover{background:rgba(255,255,255,.15);color:white}
.logout-btn{padding:6px 16px;background:rgba(255,255,255,.15);color:white;border:none;border-radius:6px;cursor:pointer;font-size:.85rem}

.cart-header-btn{position:relative;background:none;border:1px solid rgba(255,255,255,.3);border-radius:6px;cursor:pointer;font-size:.85rem;padding:6px 12px;color:rgba(255,255,255,.8);transition:all .15s;line-height:1}
.cart-header-btn:hover{background:rgba(255,255,255,.15);color:white}
.cart-badge{position:absolute;top:-6px;right:-6px;background:#ff6b6b;color:white;font-size:.65rem;font-weight:700;min-width:18px;height:18px;border-radius:9px;display:none;align-items:center;justify-content:center;padding:0 4px}
.cart-badge.show{display:flex}

.provider-switch{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.1);border-radius:8px;padding:4px}
.provider-switch label{font-size:.75rem;color:rgba(255,255,255,.6);margin-right:4px}
.provider-opt{padding:4px 10px;border:none;border-radius:6px;font-size:.75rem;cursor:pointer;background:transparent;color:rgba(255,255,255,.7);font-weight:500;transition:all .15s}
.provider-opt.active{background:rgba(255,255,255,.25);color:white;font-weight:700}

.main{display:flex;flex:1;overflow:hidden}
.chat-panel{flex:1;display:flex;flex-direction:column;border-right:1px solid #ddd}
.messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px}
.message{max-width:75%;padding:12px 16px;border-radius:16px;line-height:1.5;font-size:.95rem;white-space:pre-wrap}
.message.user{align-self:flex-end;background:#1a1a2e;color:white;border-bottom-right-radius:4px}
.message.assistant{align-self:flex-start;background:white;color:#333;border-bottom-left-radius:4px;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.chat-input-area{display:flex;padding:16px;gap:8px;background:white;border-top:1px solid #eee}
.chat-input{flex:1;padding:12px 16px;border:1px solid #ddd;border-radius:24px;font-size:.95rem;outline:none}
.chat-input:focus{border-color:#1a1a2e}
.send-btn{padding:12px 24px;background:#1a1a2e;color:white;border:none;border-radius:24px;cursor:pointer;font-weight:600}

.reco-panel{width:380px;display:flex;flex-direction:column;background:#fafafa;overflow-y:auto;padding:20px}
.reco-btn{padding:16px;background:linear-gradient(135deg,#6b21a8,#1e40af);color:white;border:none;border-radius:12px;font-size:1.1rem;font-weight:700;cursor:pointer;margin-bottom:20px;transition:transform .15s,box-shadow .15s}
.reco-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.2)}
.section-label{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;padding:0 4px}
.section-label.best{color:#16a34a}
.section-label.other{color:#666;margin-top:16px}

.product-card{background:white;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.08);transition:transform .15s;cursor:pointer;position:relative}
.product-card:hover{transform:translateY(-2px)}
.product-card.best-match{border:2px solid #16a34a;box-shadow:0 2px 12px rgba(22,163,74,.15)}
.best-badge{display:inline-block;background:#16a34a;color:white;font-size:.7rem;font-weight:700;padding:2px 8px;border-radius:4px;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.product-icon{font-size:2rem;margin-bottom:8px}
.product-name{font-weight:600;color:#1a1a2e;margin-bottom:4px}
.product-tags{font-size:.8rem;color:#888;margin-bottom:8px}
.product-price{font-weight:700;color:#16a34a;font-size:1.1rem;display:flex;align-items:center;justify-content:center;gap:8px}
.prod-cart-icon{display:inline-flex;align-items:center;justify-content:center;background:none;border:1px solid #ddd;border-radius:6px;cursor:pointer;font-size:.82rem;padding:4px 10px;transition:all .15s;color:#888}
.prod-cart-icon:hover{border-color:#16a34a;color:#16a34a;background:#f0fdf4}
.in-cart-card{position:absolute;top:8px;right:8px;background:#1a1a2e;color:white;font-size:.65rem;font-weight:600;padding:2px 8px;border-radius:10px}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);align-items:center;justify-content:center}
.modal-overlay.active{display:flex}
#cartModal{z-index:100}
#prodModal{z-index:110}
#detailModal{z-index:120}
.modal{background:white;border-radius:16px;width:720px;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.3);animation:modalIn .2s ease}
@keyframes modalIn{from{opacity:0;transform:scale(.95) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid #eee;flex-shrink:0}
.modal-header h2{font-size:1.3rem;color:#1a1a2e}
.modal-header .h2-sub{font-size:.85rem;color:#888;font-weight:400;margin-left:8px}
.modal-close{background:none;border:none;font-size:1.5rem;cursor:pointer;color:#999;padding:4px 8px;border-radius:6px}
.modal-close:hover{background:#f0f0f0;color:#333}
.modal-body{padding:0;overflow-y:auto;flex:1}

/* Cart */
.cart-layout{display:flex;min-height:280px}
.cart-items{flex:1;padding:20px 24px}
.cart-summary{width:240px;flex-shrink:0;padding:20px 24px;background:#fafafa;border-left:1px solid #eee;display:flex;flex-direction:column;justify-content:space-between}
.cart-row{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid #f5f5f5}
.cart-row:last-of-type{border-bottom:none}
.cr-emoji{font-size:1.6rem;width:40px;text-align:center}
.cr-info{flex:1;min-width:0}
.cr-name{font-weight:600;color:#1a1a2e;font-size:.92rem}
.cr-price{color:#888;font-size:.8rem;margin-top:1px}
.cr-qty{display:flex;align-items:center;gap:2px;background:#f5f5f5;border-radius:8px;padding:2px}
.cr-qbtn{width:28px;height:28px;border-radius:6px;border:none;background:transparent;cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center;color:#555;font-weight:600;transition:background .1s}
.cr-qbtn:hover{background:rgba(0,0,0,.08)}
.cr-qval{min-width:28px;text-align:center;font-weight:600;font-size:.9rem;color:#1a1a2e}
.cr-subtotal{font-weight:700;color:#16a34a;font-size:.95rem;min-width:70px;text-align:right}
.cr-del{background:none;border:none;color:#ddd;cursor:pointer;font-size:.85rem;padding:4px 6px;border-radius:4px;transition:all .15s}
.cr-del:hover{color:#ff6b6b;background:#fff0f0}
.summary-label{font-size:.85rem;color:#888;margin-bottom:4px}
.summary-total{font-size:1.6rem;font-weight:700;color:#1a1a2e;margin-bottom:4px}
.summary-count{font-size:.82rem;color:#999;margin-bottom:20px}
.summary-breakdown{margin-bottom:16px}
.sb-row{display:flex;justify-content:space-between;padding:4px 0;font-size:.82rem;color:#888}
.sb-row.total{border-top:1px solid #e0e0e0;margin-top:6px;padding-top:10px;font-weight:700;color:#1a1a2e;font-size:.9rem}
.btn-checkout{width:100%;padding:12px;background:linear-gradient(135deg,#6b21a8,#1e40af);color:white;border:none;border-radius:10px;font-size:.92rem;font-weight:700;cursor:pointer}
.btn-checkout.disabled{opacity:.5;cursor:not-allowed}
.btn-clear{width:100%;padding:8px;background:none;border:1px solid #eee;border-radius:8px;color:#999;cursor:pointer;font-size:.78rem;transition:all .15s;margin-top:8px}
.btn-clear:hover{border-color:#ff6b6b;color:#ff6b6b}
.empty-state{text-align:center;padding:60px 0;color:#999}
.empty-state .big-icon{font-size:3rem;margin-bottom:12px}
.qa-strip{padding:0 24px 20px}
.qa-hdr{font-size:.78rem;color:#ccc;padding:12px 24px 4px;display:flex;align-items:center;gap:12px}
.qa-hdr span{flex:1;height:1px;background:#eee}
.qa-grid{display:flex;flex-wrap:wrap;gap:8px}
.qa-chip{display:flex;align-items:center;gap:6px;padding:6px 12px;background:#f5f5f5;border-radius:20px;cursor:pointer;font-size:.8rem;color:#555;transition:background .15s;border:none}
.qa-chip:hover{background:#e8e8e8}
.qa-chip .qa-p{font-weight:700;color:#1a1a2e;margin-left:2px}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);background:#16a34a;color:white;padding:10px 20px;border-radius:10px;font-weight:600;font-size:.88rem;z-index:200;transition:transform .35s ease;opacity:0;box-shadow:0 4px 16px rgba(22,163,74,.3)}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* Product detail modal */
.detail-wrap{display:flex;gap:24px;padding:24px;align-items:flex-start}
.detail-emoji{font-size:4rem;min-width:90px;text-align:center;line-height:1}
.detail-info{flex:1}
.detail-name{font-size:1.4rem;font-weight:700;color:#1a1a2e;margin-bottom:8px}
.detail-cat{display:inline-block;background:#f0f0f0;color:#888;font-size:.78rem;padding:4px 12px;border-radius:12px;margin-bottom:10px}
.detail-tags{font-size:.85rem;color:#666;margin-bottom:10px}
.detail-tags span{display:inline-block;background:#f5f5f5;color:#555;padding:2px 10px;border-radius:10px;margin:2px 4px 2px 0;font-size:.78rem}
.detail-price{font-size:1.8rem;font-weight:700;color:#16a34a;display:flex;align-items:center;gap:12px}
.detail-cart-btn{background:none;border:1px solid #16a34a;border-radius:6px;cursor:pointer;font-size:.85rem;padding:5px 12px;color:#16a34a;transition:all .15s;line-height:1}
.detail-cart-btn:hover{background:#f0fdf4}
.detail-cart-btn.in-cart-d{border-color:#16a34a;background:#16a34a;color:white}
.detail-cart-btn.in-cart-d:hover{background:#138a3d;border-color:#138a3d}
.detail-cart-badge{display:inline-block;background:#f0f0f0;color:#888;font-size:.78rem;padding:4px 12px;border-radius:12px;margin-bottom:10px}

/* Product grid modal card */
.pg-card{background:white;border-radius:12px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.08);transition:transform .15s;cursor:pointer;position:relative;text-align:center}
.pg-card:hover{transform:translateY(-2px)}
.pg-emoji{font-size:1.8rem;margin-bottom:6px}
.pg-name{font-weight:600;color:#1a1a2e;font-size:.85rem}
.pg-price{font-weight:700;color:#16a34a;font-size:.9rem}
</style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-nav"><button class="nav-link" style="color:#1a1a2e;border-color:#1a1a2e;" onclick="showProducts()">📦 产品列表</button></div>
  <h1>🛍️ 智能购物助手</h1>
  <p>登录后与您的私人购物助手聊天</p>
  <div class="login-buttons">
    <button class="login-btn marla" onclick="login('marla')">👩 以 Marla 登录</button>
    <button class="login-btn steve" onclick="login('steve')">👨 以 Steve 登录</button>
    <button class="login-btn" style="background:#d1fae5;color:#065f46" onclick="login('fzf003')">🧑 以 fzf003 登录</button>
  </div>
</div>

<div class="app" id="app" style="display:none">
  <div class="header">
    <h2>🛍️ 智能购物助手</h2>
    <div class="provider-switch"><label>推荐方式:</label><button class="provider-opt active">关键词匹配</button></div>
    <div class="user-info">
      <button class="nav-link" onclick="showProducts()">📦 查看产品</button>
      <button class="cart-header-btn" onclick="toggleCart()">🛒<span class="cart-badge" id="cartBadge">0</span></button>
      <span id="userName"></span>
      <button class="logout-btn" onclick="logout()">退出登录</button>
    </div>
  </div>
  <div class="main">
    <div class="chat-panel">
      <div class="messages"><div class="welcome" style="text-align:center;color:#999;margin-top:40px;font-size:.95rem;">开始聊天，告诉我您的喜好！</div></div>
      <div class="chat-input-area"><input type="text" class="chat-input" placeholder="说说您喜欢什么..."><button class="send-btn">发送</button></div>
    </div>
    <div class="reco-panel">
      <button class="reco-btn" onclick="renderRecoProducts()">✨ 给我推荐商品</button>
      <div id="recoProducts"></div>
    </div>
  </div>
</div>

<!-- Cart Modal -->
<div class="modal-overlay" id="cartModal" onclick="if(event.target===this) toggleCart()">
  <div class="modal">
    <div class="modal-header">
      <h2>🛒 购物车 <span class="h2-sub" id="modalSub">共 0 件商品</span></h2>
      <button class="modal-close" onclick="toggleCart()">✕</button>
    </div>
    <div class="modal-body" id="cartBody"></div>
  </div>
</div>

<!-- Products Modal -->
<div class="modal-overlay" id="prodModal" onclick="if(event.target===this) closeProdModal()">
  <div class="modal" style="width:680px">
    <div class="modal-header">
      <h2>📦 全部商品</h2>
      <button class="modal-close" onclick="closeProdModal()">✕</button>
    </div>
    <div class="modal-body" style="padding:20px 24px;display:grid;grid-template-columns:1fr 1fr;gap:12px" id="prodGrid"></div>
  </div>
</div>

<!-- Product Detail Modal -->
<div class="modal-overlay" id="detailModal" onclick="if(event.target===this) closeDetail()">
  <div class="modal" style="width:480px">
    <div class="modal-header">
      <h2>商品详情</h2>
      <button class="modal-close" onclick="closeDetail()">✕</button>
    </div>
    <div class="modal-body" id="detailBody"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var PRODUCTS = [
  {id:1, name:"经典皮夹克",     cat:"服装",     emoji:"🧥", price:189.99, tags:["皮衣","外套","时尚","潮流","夹克"]},
  {id:2, name:"有机棉T恤",       cat:"服装",     emoji:"👕", price:29.99,  tags:["有机","休闲","环保","基础款"]},
  {id:3, name:"专业跑鞋",        cat:"鞋类",     emoji:"👟", price:129.99, tags:["跑步","运动","健身","体育","鞋子"]},
  {id:4, name:"无线降噪耳机",    cat:"电子产品", emoji:"🎧", price:249.99, tags:["音频","音乐","科技","无线"]},
  {id:5, name:"意式浓缩咖啡机",  cat:"厨房用品", emoji:"☕", price:349.99, tags:["咖啡","浓缩","厨房","早晨"]},
  {id:6, name:"高级瑜伽垫",      cat:"健身",     emoji:"🧘", price:59.99,  tags:["瑜伽","健身","健康","运动"]},
  {id:7, name:"复古黑胶唱片机",  cat:"电子产品", emoji:"🎵", price:199.99, tags:["音乐","复古","唱片","音频"]},
  {id:8, name:"不锈钢保温水瓶",  cat:"配件",     emoji:"💧", price:24.99,  tags:["环保","可持续","补水","健身"]}
];

var cart = JSON.parse(localStorage.getItem("pc_cart3"));
if (!cart) cart = [{pid:1,q:1},{pid:4,q:2},{pid:7,q:1}];

function save() { localStorage.setItem("pc_cart3", JSON.stringify(cart)); }
function prod(id) { for (var i=0;i<PRODUCTS.length;i++) if (PRODUCTS[i].id===id) return PRODUCTS[i]; return null; }
function totalItems() { var s=0; for (var i=0;i<cart.length;i++) s+=cart[i].q; return s; }
function totalPrice() { var s=0; for (var i=0;i<cart.length;i++) { var p=prod(cart[i].pid); if (p) s+=p.price*cart[i].q; } return s; }
function cartItems() { var r=[]; for (var i=0;i<cart.length;i++) { var p=prod(cart[i].pid); if (p) r.push({pid:cart[i].pid,q:cart[i].q,name:p.name,emoji:p.emoji,price:p.price,sub:+(p.price*cart[i].q).toFixed(2)}); } return r; }
function inCart(id) { for (var i=0;i<cart.length;i++) if (cart[i].pid===id) return cart[i].q; return 0; }

function addItem(pid) {
  var ex = null;
  for (var i=0;i<cart.length;i++) { if (cart[i].pid===pid) { ex=cart[i]; break; } }
  if (ex) ex.q++; else cart.push({pid:pid,q:1});
  save(); updateBadge(); renderRecoProducts(); renderProdGrid();
  // Refresh detail modal if open
  var dm = document.getElementById("detailModal");
  if (dm.classList.contains("active")) {
    var curId = dm._currentPid;
    if (curId) showDetail(curId, true);
  }
  toast("✅ 已加入购物车");
}
function changeQty(pid, d) {
  for (var i=0;i<cart.length;i++) { if (cart[i].pid===pid) { cart[i].q+=d; if (cart[i].q<=0) cart.splice(i,1); break; } }
  save(); renderCart(); updateBadge();
}
function removeItem(pid) { for (var i=0;i<cart.length;i++) { if (cart[i].pid===pid) { cart.splice(i,1); break; } } save(); renderCart(); updateBadge(); }
function clearCart() { if (!confirm("确定清空购物车？")) return; cart=[]; save(); renderCart(); updateBadge(); }

function updateBadge() {
  var b = document.getElementById("cartBadge");
  var n = totalItems();
  if (n > 0) { b.textContent = n; b.classList.add("show"); } else { b.classList.remove("show"); }
}
function toast(msg) {
  var t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(t._timer); t._timer = setTimeout(function(){t.classList.remove("show");}, 1500);
}

// Cards
function cardHTML(p, isBest) {
  var q = inCart(p.id);
  var h = '<div class="product-card' + (isBest ? " best-match" : "") + '" onclick="showDetail(' + p.id + ')">';
  if (isBest) h += '<div class="best-badge">⭐ 最佳推荐</div>';
  if (q) h += '<span class="in-cart-card">🛒 x' + q + '</span>';
  h += '<div class="product-icon">' + p.emoji + '</div>';
  h += '<div class="product-name">' + p.name + '</div>';
  h += '<div class="product-tags">' + p.tags.join(" · ") + '</div>';
  h += '<div class="product-price">$' + p.price.toFixed(2) + '<button class="prod-cart-icon" onclick="event.stopPropagation();addItem(' + p.id + ')">🛒</button></div></div>';
  return h;
}

function renderRecoProducts() {
  var c = document.getElementById("recoProducts");
  if (!c) return;
  c.innerHTML = '<div class="section-label best">🎯 为您推荐</div>';
  c.innerHTML += cardHTML(PRODUCTS[0], true);
  c.innerHTML += '<div class="section-label other">📋 其他商品</div>';
  for (var i=1;i<PRODUCTS.length;i++) c.innerHTML += cardHTML(PRODUCTS[i], false);
}

// Products grid modal
function showProducts() { document.getElementById("prodModal").classList.add("active"); renderProdGrid(); }
function closeProdModal() { document.getElementById("prodModal").classList.remove("active"); }

function renderProdGrid() {
  var grid = document.getElementById("prodGrid"), h = "";
  for (var i=0;i<PRODUCTS.length;i++) {
    var p = PRODUCTS[i], q = inCart(p.id);
    h += '<div class="pg-card" onclick="showDetail(' + p.id + ')">';
    if (q) h += '<span class="in-cart-card" style="font-size:.6rem;padding:1px 6px">🛒 x' + q + '</span>';
    h += '<div class="pg-emoji">' + p.emoji + '</div>';
    h += '<div class="pg-name">' + p.name + '</div>';
    h += '<div style="font-size:.72rem;color:#aaa;margin:2px 0 4px">' + p.cat + '</div>';
    h += '<div class="pg-price">$' + p.price.toFixed(2) + '</div></div>';
  }
  grid.innerHTML = h;
}

// Detail modal
function showDetail(id, silent) {
  var p = prod(id);
  if (!p) return;
  var body = document.getElementById("detailBody");
  var q = inCart(id);
  var tagsHtml = "";
  for (var i=0;i<p.tags.length;i++) tagsHtml += '<span>' + p.tags[i] + '</span>';
  body.innerHTML = '<div class="detail-wrap">' +
    '<div class="detail-emoji">' + p.emoji + '</div>' +
    '<div class="detail-info">' +
    '<div class="detail-name">' + p.name + '</div>' +
    '<div class="detail-cart-badge">' + p.cat + '</div>' +
    '<div class="detail-tags">' + tagsHtml + '</div>' +
    '<div class="detail-price">$' + p.price.toFixed(2) +
    '<button class="detail-cart-btn' + (q ? ' in-cart-d' : '') + '" onclick="event.stopPropagation();addItem(' + p.id + ')">' + (q ? '✓ 已加' : '🛒') + '</button>' +
    '</div>' +
    '<div style="font-size:.78rem;color:#999;margin-top:12px">' + (q ? '已在购物车，数量: ' + q : '') + '</div>' +
    '</div></div>';
  if (!silent) {
    // Close other modals first
    document.getElementById("cartModal").classList.remove("active");
    document.getElementById("prodModal").classList.remove("active");
    document.getElementById("detailModal").classList.add("active");
  }
  document.getElementById("detailModal")._currentPid = id;
}
function closeDetail() { document.getElementById("detailModal").classList.remove("active"); }

// Cart modal
function toggleCart() {
  var m = document.getElementById("cartModal");
  m.classList.toggle("active");
  if (m.classList.contains("active")) renderCart();
}

function renderCart() {
  var body = document.getElementById("cartBody"), sub = document.getElementById("modalSub"), its = cartItems();
  sub.textContent = "共 " + totalItems() + " 件商品";
  if (its.length === 0) { body.innerHTML = '<div class="empty-state"><div class="big-icon">🛒</div><p>购物车是空的</p></div>'; return; }
  var html = '<div class="cart-layout"><div class="cart-items">';
  for (var i=0;i<its.length;i++) {
    var it = its[i];
    html += '<div class="cart-row"><div class="cr-emoji">' + it.emoji + '</div><div class="cr-info"><div class="cr-name">' + it.name + '</div><div class="cr-price">$' + it.price.toFixed(2) + ' / 件</div></div><div class="cr-qty"><button class="cr-qbtn" onclick="changeQty(' + it.pid + ',-1)">−</button><span class="cr-qval">' + it.q + '</span><button class="cr-qbtn" onclick="changeQty(' + it.pid + ',1)">+</button></div><div class="cr-subtotal">$' + it.sub.toFixed(2) + '</div><button class="cr-del" onclick="removeItem(' + it.pid + ')">✕</button></div>';
  }
  html += '</div>';
  var total = totalPrice();
  html += '<div class="cart-summary"><div><div class="summary-label">购物车合计</div><div class="summary-total">$' + total.toFixed(2) + '</div><div class="summary-count">共 ' + totalItems() + ' 件商品</div><div class="summary-breakdown">';
  for (var i=0;i<its.length;i++) html += '<div class="sb-row"><span>' + its[i].emoji + " " + its[i].name + " x" + its[i].q + '</span><span>$' + its[i].sub.toFixed(2) + '</span></div>';
  html += '<div class="sb-row total"><span>应付总计</span><span>$' + total.toFixed(2) + '</span></div></div></div><div><button class="btn-checkout disabled" disabled>去结算（暂未开放）</button><button class="btn-clear" onclick="clearCart()">清空购物车</button></div></div></div>';
  var notIn = [];
  for (var i=0;i<PRODUCTS.length;i++) { var f=false; for (var j=0;j<cart.length;j++) { if (cart[j].pid===PRODUCTS[i].id) { f=true; break; } } if (!f) notIn.push(PRODUCTS[i]); }
  if (notIn.length > 0) {
    html += '<div class="qa-strip"><div class="qa-hdr"><span>还没加的商品</span><span></span></div><div class="qa-grid">';
    for (var i=0;i<notIn.length;i++) html += '<button class="qa-chip" onclick="addItem(' + notIn[i].id + ');renderCart()">' + notIn[i].emoji + " " + notIn[i].name + '<span class="qa-p">+</span></button>';
    html += '</div></div>';
  }
  body.innerHTML = html;
}

function login(name) {
  document.getElementById("userName").textContent = "你好, " + name + "!";
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("app").style.display = "flex";
  renderRecoProducts();
}
function logout() { document.getElementById("app").style.display = "none"; document.getElementById("loginScreen").style.display = "flex"; }

updateBadge();
</script>
